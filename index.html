<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#171009" />
  <meta name="description" content="CEN Bible 정복시대 Matrix" />
  <meta property="og:title" content="CEN Bible 정복시대 Matrix" />
  <meta property="og:description" content="요단강 도하부터 세겜 언약까지 정복시대 핵심사건 Matrix" />
  <meta property="og:image" content="assets/conquest-bg-extended.png" />
  <title>CEN Bible 정복시대 Matrix</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <button id="resetView" class="top-btn" type="button">화면맞춤</button>
      <div class="title-wrap">
        <strong>정복시대 Matrix</strong>
        <span>드래그 · 핀치확대 · 사건별 탐험</span>
      </div>
      <button id="zoomOut" class="top-btn" type="button">－</button>
      <button id="zoomIn" class="top-btn" type="button">＋</button>
    </header>

    <main id="viewport" class="viewport" aria-label="정복시대 매트릭스 화면">
      <section id="canvas" class="canvas">
        <img class="matrix-bg" src="assets/conquest-bg-extended.png" alt="정복시대 매트릭스 배경" draggable="false" />

        <div class="button-set row-1" data-event="요단강 도하">
          <button data-kind="hub">요단강 도하 허브</button>
          <button data-kind="link">연결탐험</button>
          <button data-kind="integrated">통합탐험</button>
        </div>
        <div class="button-set row-2" data-event="여리고 함락">
          <button data-kind="hub">여리고 함락 허브</button>
          <button data-kind="link">연결탐험</button>
          <button data-kind="integrated">통합탐험</button>
        </div>
        <div class="button-set row-3" data-event="가나안 정복">
          <button data-kind="hub">가나안 정복 허브</button>
          <button data-kind="link">연결탐험</button>
          <button data-kind="integrated">통합탐험</button>
        </div>
        <div class="button-set row-4" data-event="기업 분배">
          <button data-kind="hub">기업 분배 허브</button>
          <button data-kind="link">연결탐험</button>
          <button data-kind="integrated">통합탐험</button>
        </div>
        <div class="button-set row-5" data-event="세겜 언약">
          <button data-kind="hub">세겜 언약 허브</button>
          <button data-kind="link">연결탐험</button>
          <button data-kind="integrated">통합탐험</button>
        </div>
      </section>
    </main>

    <nav class="footer" aria-label="하단 메뉴">
      <button type="button" data-footer="home">홈</button>
      <button type="button" data-footer="matrix">시대총람</button>
      <button type="button" data-footer="prev">출애굽·광야</button>
      <button type="button" data-footer="next">사사시대</button>
    </nav>
  </div>

  <dialog id="infoDialog" class="dialog">
    <div class="dialog-card">
      <h2 id="dialogTitle">정복시대</h2>
      <p id="dialogText">첫 버전에서는 버튼 위치와 조작감을 확인합니다.</p>
      <div class="dialog-actions">
        <button id="closeDialog" type="button">닫기</button>
      </div>
    </div>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
