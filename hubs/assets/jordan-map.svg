      .node{fill:#1c2024;stroke:#f2c76f;stroke-width:3}
      .gold{fill:#f2c76f}.route{fill:none;stroke:#f2c76f;stroke-width:8;stroke-linecap:round;stroke-dasharray:16 16}.land{fill:#7b5422;opacity:.62}.hill{fill:#3a4b2d;opacity:.54}
    </style>
